spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    repair-on-migrate: true
    locations: classpath:db/migration
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: ${PORT:8080}

app:
  mail:
    from: ${MAIL_USERNAME}
    from-name: Pacha Suite Hotel
    expiracion-minutos: 10
    destinatario-contacto: ${MAIL_USERNAME}

logging:
  level:
    com.pachasuite: INFO
    root: WARN

recaptcha:
  secret-key: ${RECAPTCHA_SECRET_KEY}

rate:
  limit:
    max-requests: 20
    window-ms: 900000

admin:
  password: ${ADMIN_PASSWORD}

supabase:
  url: ${SUPABASE_URL}
  service-key: ${SUPABASE_SERVICE_KEY}
  bucket: ${SUPABASE_BUCKET}
